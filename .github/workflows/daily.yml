name: Daily ArXiv Digest

on:
  schedule:
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-arxiv
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openai python-dotenv

      - name: Run daily fetch
        run: |
          python scripts/fetch_arxiv_daily.py --config config.yml

      - name: Generate Greek summaries
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/summarize_papers_el.py --db data/papers.json --limit 20

      - name: Build Greek digest
        run: |
          python scripts/build_greek_digest.py --min-score 6 --limit 15

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily arXiv update"
            git push
          fi
