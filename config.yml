  - name: "Intention and Crossing Behavior"
    slug: "intention_crossing_behavior"
    query: '(ti:intention OR abs:intention OR ti:"crossing intention" OR abs:"crossing intention" OR ti:"crossing behavior" OR abs:"crossing behavior" OR ti:"crossing decision" OR abs:"crossing decision" OR ti:"pedestrian intention" OR abs:"pedestrian intention" OR ti:"gap acceptance" OR abs:"gap acceptance") AND (ti:pedestrian OR abs:pedestrian OR ti:VRU OR abs:VRU OR ti:"vulnerable road user" OR abs:"vulnerable road user" OR ti:cyclist OR abs:cyclist)'
    include_keywords:
