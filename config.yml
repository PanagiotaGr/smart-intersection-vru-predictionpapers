project:
  title: "Diploma Thesis – Trajectory Prediction of Vulnerable Road Users"
  subtitle: "Daily ArXiv digest focused on VRU trajectory prediction, behavior, interaction, and safety in smart intersections and autonomous driving."
  timezone: "Europe/Athens"

storage:
  data_dir: "data"
  db_file: "papers.json"
  digests_dir: "digests"
  topics_dir: "topics"

arxiv:
  endpoint: "http://export.arxiv.org/api/query"
  max_results_per_topic: 120
  days_back: 4

  # τραβάμε αρκετά και μετά κάνουμε filtering / scoring
  fetch_multiplier: 10
  hard_cap_results: 600

  allowed_categories:
    - "cs.CV"
    - "cs.RO"
    - "eess.IV"
    - "stat.ML"
    - "cs.LG"

filters:
  # Global gate: αρκετά ανοιχτό ώστε να πιάνει και papers που δεν γράφουν μόνο "trajectory prediction"
  include_keywords:
    - "trajectory prediction"
    - "motion prediction"
    - "trajectory forecasting"
    - "motion forecasting"
    - "trajectory forecast"
    - "motion forecast"
    - "path prediction"
    - "path forecasting"
    - "future trajectory"
    - "future motion"
    - "behavior prediction"
    - "behavior forecasting"
    - "intention prediction"
    - "intention estimation"
    - "crossing intention"
    - "crossing behavior"
    - "crossing decision"
    - "gap acceptance"
    - "scene forecasting"
    - "agent forecasting"
    - "interactive prediction"
    - "interaction-aware"
    - "social prediction"
    - "multi-agent prediction"
    - "probabilistic prediction"
    - "uncertainty-aware prediction"
    - "risk-aware prediction"
    - "collision prediction"
    - "vulnerable road user"
    - "vru"
    - "road user"
    - "pedestrian"
    - "cyclist"
    - "bicyclist"
    - "bicycle"
    - "bike"
    - "micromobility"
    - "e-scooter"
    - "scooter rider"
    - "stroller"

  # μόνο σχετικά ισχυρά excludes
  exclude_keywords:
    - "license plate"
    - "vehicle re-identification"
    - "re-identification"
    - "lane detection"
    - "lane segmentation"
    - "rain removal"
    - "dehazing"
    - "super-resolution"
    - "travel time"
    - "traffic flow"
    - "traffic forecasting"
    - "pavement"
    - "road surface"
    - "image enhancement"
    - "object detection only"
    - "speech recognition"
    - "medical imaging"
    - "protein structure"

  # dedupe ανά topic για να μπορεί ένα paper να εμφανίζεται σε πολλά σχετικά buckets
  dedupe_mode: "topic"

  # προαιρετικό scoring αν το υποστηρίζει ο κώδικάς σου
  scoring:
    strong_positive:
      - "trajectory prediction"
      - "motion prediction"
      - "trajectory forecasting"
      - "motion forecasting"
      - "behavior prediction"
      - "intention prediction"
      - "crossing intention"
      - "crossing behavior"
      - "gap acceptance"
    medium_positive:
      - "pedestrian"
      - "cyclist"
      - "bicyclist"
      - "vulnerable road user"
      - "vru"
      - "micromobility"
      - "interaction"
      - "social"
      - "multi-agent"
      - "uncertainty"
      - "probabilistic"
      - "risk"
      - "safety"
      - "collision"
      - "intersection"
      - "crosswalk"
      - "traffic light"
      - "autonomous driving"
    strong_negative:
      - "license plate"
      - "re-identification"
      - "lane detection"
      - "traffic flow"
      - "pavement"
      - "road surface"
    min_score: 2

topics:
  - name: "Pedestrian Trajectory Prediction"
    slug: "pedestrian_trajectory_prediction"
    query: '(ti:"trajectory prediction" OR abs:"trajectory prediction" OR ti:"motion prediction" OR abs:"motion prediction" OR ti:"trajectory forecasting" OR abs:"trajectory forecasting" OR ti:"motion forecasting" OR abs:"motion forecasting" OR ti:"behavior prediction" OR abs:"behavior prediction") AND (ti:pedestrian OR abs:pedestrian OR ti:"vulnerable road user" OR abs:"vulnerable road user" OR ti:VRU OR abs:VRU)'
    include_keywords:
      - "pedestrian"
    exclude_keywords: []
    boost_keywords:
      - "intersection"
      - "crosswalk"
      - "signalized"
      - "jaywalking"
      - "traffic light"
      - "smart intersection"

  - name: "Cyclist and Micromobility Prediction"
    slug: "cyclist_micromobility_prediction"
    query: '(ti:"trajectory prediction" OR abs:"trajectory prediction" OR ti:"motion prediction" OR abs:"motion prediction" OR ti:"trajectory forecasting" OR abs:"trajectory forecasting" OR ti:"motion forecasting" OR abs:"motion forecasting" OR ti:"behavior prediction" OR abs:"behavior prediction") AND (ti:cyclist OR abs:cyclist OR ti:bicyclist OR abs:bicyclist OR ti:bicycle OR abs:bicycle OR ti:bike OR abs:bike OR ti:micromobility OR abs:micromobility OR ti:"e-scooter" OR abs:"e-scooter" OR ti:scooter OR abs:scooter)'
    include_keywords:
      - "cyclist"
      - "bicyclist"
      - "bicycle"
      - "bike"
      - "micromobility"
      - "e-scooter"
      - "scooter"
    exclude_keywords: []
    boost_keywords:
      - "intersection"
      - "crosswalk"
      - "signalized"
      - "traffic light"
      - "urban"

  - name: "Interaction-aware and Social Models"
